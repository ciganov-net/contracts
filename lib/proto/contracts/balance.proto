syntax = "proto3";

package balance.v1;

import "google/protobuf/timestamp.proto";

service BalanceService {
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc GetUserTransactions(GetUserTransactionsRequest) returns (GetUserTransactionsResponse);
  rpc AddTransaction(AddTransactionRequest) returns (AddTransactionResponse);
  rpc CreateWallet(CreateWalletRequest) returns (CreateWalletResponse);
}

message CreateWalletRequest {
  string userId = 1;
}

message CreateWalletResponse {
  bool ok = 1;
}

message GetBalanceRequest {
  string userId = 1;
}

message GetBalanceResponse {
  Balance balance = 1;
}

message GetUserTransactionsRequest {
  string userId = 1;
}

message GetUserTransactionsResponse {
  repeated Transaction transactions = 1;
}

message AddTransactionRequest {
  TransactionType type       = 1;
  float           amount     = 2;
  optional string eventId    = 3;
  string          userId     = 4;
  optional float  multiplier = 5;
}

message AddTransactionResponse {
  bool ok = 1;
}

message Transaction {
  string                    id         = 1;
  TransactionType           type       = 2;
  float                     amount     = 3;
  string                    eventId    = 4;
  google.protobuf.Timestamp created_at = 5;
}

message Balance {
  string id             = 1;
  float  main_balance   = 2;
  float  bonus_balance  = 3;
  float  freeze_balance = 4;
}

enum TransactionType {
  DEPOSIT    = 0;
  WITHDRAW   = 1;
  BET_FREEZE = 2;
  BET_WIN    = 3;
  BET_LOSE   = 4;
  REFUND     = 5;
  BET_BONUS  = 6;
  ADD_BONUS  = 7;
}